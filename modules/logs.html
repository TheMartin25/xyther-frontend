<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs - Xyther Bot</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 280px;
            background: #111111;
            border-right: 1px solid #3a2c0f;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
        }

        .sidebar h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 700;
            font-size: 2.2rem;
            color: #d4af37;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #3a2c0f;
            text-align: center;
        }

        .server-info-sidebar {
            background: #1a1a1a;
            border: 1px solid #3a2c0f;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .server-icon-sidebar {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #d4af37;
        }

        .server-name-sidebar {
            font-weight: 600;
            color: #d4af37;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-menu {
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.9rem 1rem;
            margin: 0.3rem 0;
            border-radius: 10px;
            color: #bbb;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .nav-item i {
            color: #d4af37;
            width: 24px;
            font-size: 1.2rem;
        }

        .nav-item:hover {
            background: #1f1a0e;
            border-color: #d4af37;
            color: #d4af37;
            transform: translateX(5px);
        }

        .sidebar-footer {
            border-top: 1px solid #2a2a2a;
            padding-top: 1rem;
            font-size: 0.8rem;
            color: #555;
            text-align: center;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
        }

        .top-bar {
            background: #111111;
            padding: 0.8rem 2rem;
            border-bottom: 1px solid #3a2c0f;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .profile-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .discord-link {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1f1a0e;
            padding: 0.5rem;
            border-radius: 50%;
            border: 1px solid #d4af37;
            transition: 0.3s;
            color: #d4af37;
            text-decoration: none;
            width: 40px;
            height: 40px;
            margin-right: 15px;
        }

        .discord-link:hover {
            background: #d4af37;
            color: #111;
            transform: translateY(-2px);
        }

        .profile-pic {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            object-fit: cover;
            cursor: pointer;
        }

        .profile-dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-menu {
            position: absolute;
            top: 60px;
            right: 0;
            background: #1a1a1a;
            border: 1px solid #3a2c0f;
            border-radius: 12px;
            min-width: 200px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .profile-dropdown:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-header {
            padding: 1rem;
            border-bottom: 1px solid #2a2a2a;
        }

        .dropdown-user {
            color: #d4af37;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .dropdown-tag {
            color: #777;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.8rem 1rem;
            color: #e0e0e0;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .dropdown-item:hover {
            background: #2a2a2a;
            color: #d4af37;
        }

        .module-content {
            padding: 2rem;
            overflow-y: auto;
        }

        .module-header {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 1px solid #3a2c0f;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .module-icon {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #d4af37;
            border: 2px solid #d4af37;
        }

        .module-header-info h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #d4af37;
            margin-bottom: 0.5rem;
        }

        .module-header-info p {
            color: #999;
            font-size: 1rem;
        }

        .config-card {
            background: #111111;
            border: 1px solid #3a2c0f;
            border-radius: 16px;
            padding: 2rem;
        }

        .config-section {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #2a2a2a;
        }

        .config-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #d4af37;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .info-box {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid #d4af37;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .info-box i {
            color: #d4af37;
            font-size: 1.5rem;
        }

        .info-box p {
            color: #e0e0e0;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .setting-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .setting-label {
            color: #e0e0e0;
            font-size: 1rem;
            min-width: 250px;
        }

        .setting-label i {
            color: #d4af37;
            margin-right: 8px;
        }

        .form-input {
            padding: 0.8rem 1rem;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 30px;
            color: #e0e0e0;
            font-size: 1rem;
            transition: all 0.3s ease;
            min-width: 250px;
            flex: 1;
        }

        .form-input:hover {
            border-color: #d4af37;
        }

        .form-input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
        }

        .btn {
            padding: 0.8rem 2rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 1rem;
            background: #d4af37;
            color: #0a0a0a;
        }

        .btn:hover {
            background: #c4a032;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .loading i {
            font-size: 3rem;
            color: #d4af37;
            margin-bottom: 1rem;
        }

        /* Toast notification */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(67, 181, 129, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1);
            animation: slideUp 0.3s ease forwards;
            pointer-events: auto;
            min-width: 300px;
            justify-content: center;
        }

        .toast.error {
            background: rgba(242, 63, 67, 0.95);
        }

        .toast i {
            font-size: 1.2rem;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        .toast.hide {
            animation: fadeOut 0.3s ease forwards;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
                padding: 1rem 0.5rem;
            }

            .sidebar h1 {
                font-size: 1.2rem;
            }

            .server-info-sidebar {
                display: none;
            }

            .nav-item span {
                display: none;
            }

            .module-header {
                flex-direction: column;
                text-align: center;
            }

            .setting-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .toast {
                min-width: 250px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>Xyther Bot</h1>
        
        <div class="server-info-sidebar" id="serverInfoSidebar">
            <img class="server-icon-sidebar" id="sidebarServerIcon" src="" alt="">
            <div class="server-name-sidebar" id="sidebarServerName">Cargando...</div>
        </div>
        
        <div class="nav-menu">
            <a href="/dashboard" class="nav-item" id="serversBtn">
                <i class="fas fa-server"></i>
                <span>Servidores</span>
                <span class="arrow">→</span>
            </a>
            
            <a href="#" class="nav-item" id="backToServerBtn">
                <i class="fas fa-arrow-left"></i>
                <span>Volver al servidor</span>
                <span class="arrow">→</span>
            </a>
            
            <a href="https://docs.xytherbot.com" target="_blank" class="nav-item">
                <i class="fas fa-book"></i>
                <span>Xyther Bot Docs</span>
                <span class="arrow">↗</span>
            </a>
        </div>
        
        <div class="sidebar-footer">
            v1.0.0
        </div>
    </div>

    <div class="main">
        <div class="top-bar">
            <div class="profile-container">
                <a href="https://discord.gg/cpjjVFEZ" target="_blank" class="discord-link">
                    <i class="fab fa-discord"></i>
                </a>
                
                <div class="profile-dropdown">
                    <img class="profile-pic" id="profilePic" src="" alt="perfil">
                    
                    <div class="dropdown-menu">
                        <div class="dropdown-header">
                            <div class="dropdown-user" id="dropdownName"></div>
                            <div class="dropdown-tag" id="dropdownTag"></div>
                        </div>
                        
                        <a href="/logout" class="dropdown-item">
                            <i class="fas fa-sign-out-alt"></i>
                            Cerrar sesión
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="module-content">
            <div id="moduleContainer">
                <div class="loading">
                    <i class="fas fa-spinner fa-pulse"></i>
                    <p>Cargando configuración de Logs...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const serverId = urlParams.get('server');
            
            if (!serverId) {
                window.location.href = '/dashboard';
                return;
            }

            function showToast(message, type = 'success', duration = 3000) {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type === 'error' ? 'error' : ''}`;
                
                const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
                
                toast.innerHTML = `
                    <i class="fas ${icon}"></i>
                    <span>${message}</span>
                `;
                
                container.appendChild(toast);
                
                setTimeout(() => {
                    toast.classList.add('hide');
                    setTimeout(() => {
                        container.removeChild(toast);
                    }, 300);
                }, duration);
            }

            fetch('/api/user')
                .then(response => {
                    if (!response.ok) {
                        window.location.href = '/';
                        return null;
                    }
                    return response.json();
                })
                .then(user => {
                    if (!user) return;
                    
                    let avatarUrl;
                    if (user.avatar) {
                        avatarUrl = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${user.avatar.startsWith('a_') ? 'gif' : 'png'}?size=128`;
                    } else {
                        const defaultAvatarNum = parseInt(user.discriminator) % 5;
                        avatarUrl = `https://cdn.discordapp.com/embed/avatars/${defaultAvatarNum}.png`;
                    }
                    
                    document.getElementById('profilePic').src = avatarUrl;
                    document.getElementById('dropdownName').textContent = user.global_name || user.username;
                    document.getElementById('dropdownTag').textContent = `@${user.username}`;
                    
                    loadServerInfo(serverId);
                })
                .catch(() => {
                    window.location.href = '/';
                });

            function loadServerInfo(serverId) {
                fetch(`/api/guilds/${serverId}`)
                    .then(response => {
                        if (!response.ok) throw new Error('Error cargando servidor');
                        return response.json();
                    })
                    .then(guild => {
                        let iconUrl = 'https://cdn.discordapp.com/embed/avatars/0.png';
                        if (guild.icon) {
                            iconUrl = `https://cdn.discordapp.com/icons/${guild.id}/${guild.icon}.png?size=128`;
                        }
                        
                        document.getElementById('sidebarServerIcon').src = iconUrl;
                        document.getElementById('sidebarServerName').textContent = guild.name;
                        
                        loadModuleConfig(serverId);
                    })
                    .catch(error => {
                        console.error('Error:', error);
                    });
            }

            function loadModuleConfig(guildId) {
                fetch(`/api/guilds/${guildId}/config`)
                    .then(response => {
                        if (!response.ok) throw new Error('Error cargando configuración');
                        return response.json();
                    })
                    .then(config => {
                        console.log('Config para logs:', config.logsChannel);
                        
                        renderModule(config.logsChannel || '', guildId);
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        document.getElementById('moduleContainer').innerHTML = `
                            <div class="error">
                                <i class="fas fa-exclamation-triangle"></i>
                                <p>Error al cargar la configuración</p>
                            </div>
                        `;
                    });
            }

            function renderModule(logsChannel, guildId) {
                const container = document.getElementById('moduleContainer');
                
                container.innerHTML = `
                    <div class="module-header">
                        <div class="module-icon">
                            <i class="fas fa-history"></i>
                        </div>
                        <div class="module-header-info">
                            <h2>Logs</h2>
                            <p>Registra todas las acciones de moderación</p>
                        </div>
                    </div>

                    <div class="config-card">
                        <div class="config-section">
                            <div class="section-title">
                                <i class="fas fa-cog"></i>
                                <span>Configuración</span>
                            </div>

                            <div class="info-box">
                                <i class="fas fa-info-circle"></i>
                                <p>Todas las acciones de los módulos de seguridad serán registradas en este canal.</p>
                            </div>
                            
                            <div class="setting-row">
                                <div class="setting-label">
                                    <i class="fas fa-hashtag"></i>
                                    Canal de logs
                                </div>
                                <input type="text" class="form-input" id="logsChannel" 
                                       value="${logsChannel}" placeholder="ID del canal de texto">
                            </div>
                            <p style="color: #999; font-size: 0.85rem; margin-left: 260px;">
                                Puedes obtener el ID del canal activando el modo desarrollador en Discord
                            </p>
                        </div>

                        <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                            <button class="btn" id="saveConfig">
                                <i class="fas fa-save"></i> Guardar cambios
                            </button>
                        </div>
                    </div>
                `;

                document.getElementById('saveConfig').addEventListener('click', async () => {
                    const logsChannel = document.getElementById('logsChannel').value.trim();

                    try {
                        const response = await fetch(`/api/guilds/${guildId}/config`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ logsChannel })
                        });
                        
                        if (response.ok) {
                            showToast('Canal de logs guardado correctamente', 'success');
                        } else {
                            showToast('Error al guardar el canal de logs', 'error');
                        }
                    } catch (error) {
                        console.error('Error guardando:', error);
                        showToast('Error al guardar el canal de logs', 'error');
                    }
                });
            }

            document.getElementById('backToServerBtn').addEventListener('click', (e) => {
                e.preventDefault();
                window.location.href = `/dashboard/server/${serverId}`;
            });

            document.getElementById('serversBtn').addEventListener('click', (e) => {
                e.preventDefault();
                window.location.href = '/dashboard';
            });
        })();
    </script>
</body>
</html>
